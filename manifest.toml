packaging_format = 2

id = "minecraft"
name = "Minecraft"
description.en = "Three-dimensional sandbox construction game"
description.fr = "Jeu de construction de type \"bac à sable\" en trois dimensions"

version = "1.21.4~ynh1"

maintainers = []

[upstream]
license = "non-free"
website = "https://www.minecraft.net/"
admindoc = "https://minecraft.fandom.com/wiki/Tutorials/Setting_up_a_server"

[integration]
yunohost = ">= 12.0.9"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = "not_relevant"

sso = "not_relevant"

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.server]
    ask.en = "Select your server"
    ask.fr = "Choisir votre serveur"
    type = "select"
    choices = ["vanilla", "vanilla-snapshot", "paper", "fabric"]
    default = "vanilla"

    [install.ram]
    ask.en = "Set the memory limit for the server."
    ask.fr = "Définir la mémoire du serveur."
    type = "select"
    choices = ["1024", "2048", "4096", "8192"]
    default = "2048"

    [install.op]
    ask.en = "Enter the administrator name (Minecraft pseudo)"
    ask.fr = "Entrer le nom de l'adminsitrateur (pseudo Minecraft)"
    type = "string"

    [install.password]
    help.en = "Enter the RCON password"
    help.fr = "Entrer le mot de passe RCON"
    type = "password"

[resources]
    [resources.sources]
        [resources.sources.mcrcon]
        url = "https://github.com/Tiiffi/mcrcon/releases/download/v0.7.2/mcrcon-0.7.2-linux-x86-64.tar.gz"
        sha256 = "c1883c3f6610c751c935f4faefbf2c52f704a0f71013be2928972eef5918cb68"
        in_subdir = false

        [resources.sources.paper]
        url = "https://api.papermc.io/v2/projects/paper/versions/1.21.1/builds/128/downloads/paper-1.21.1-128.jar"
        sha256 = "4dab63990686350dbf713f9044991f112cebadb64a44865cd79a5a750b820d91"
        rename = "server.jar"
        in_subdir = false
        extract = false

        [resources.sources.vanilla]
        url = "https://piston-data.mojang.com/v1/objects/4707d00eb834b446575d89a61a11b5d548d8c001/server.jar"
        sha256 = "1066970b09e9c671844572291c4a871cc1ac2b85838bf7004fa0e778e10f1358"
        rename = "server.jar"
        in_subdir = false
        extract = false

        [resources.sources.vanilla-snapshot]
        url = "https://piston-data.mojang.com/v1/objects/4707d00eb834b446575d89a61a11b5d548d8c001/server.jar"
        sha256 = "1066970b09e9c671844572291c4a871cc1ac2b85838bf7004fa0e778e10f1358"
        rename = "server.jar"
        in_subdir = false
        extract = false

        [resources.sources.fabric]
        url = "https://meta.fabricmc.net/v2/versions/loader/1.21.5-rc1/0.16.10/1.0.1/server/jar"
        sha256 = "a41f903e26d76352a604f13e99a91c4677bf29678d702e3299fe7a20009b583e"
        rename = "server.jar"
        in_subdir = false
        extract = false

        #[resources.sources.spigot]
        #url = "https://download.getbukkit.org/spigot/spigot-1.21.jar"
        #sha256 = ""
        #rename = "server.jar"
        #in_subdir = false
        #extract = false

    [resources.ports]
    main.default = 25565
    main.exposed = "TCP"
    rconport.default = 25575
    rconport.exposed = "TCP"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]

    [resources.apt]
    packages = "openjdk-21-jdk"

